<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>C8 Elite Trading Dashboard</title>
</head>
<body>
    <header>
        <h1>C8 Elite Trading Dashboard</h1>
        <div class="jenkins-status">
            <h2>Jenkins Status</h2>
            <p id="jenkins-status-text">Loading...</p>
        </div>
    </header>
    <main>
        <section class="signal-generation">
            <h2>Signal Generation</h2>
            <button id="generate-signal">Generate Signal</button>
            <div id="signal-output">No signal generated.</div>
        </section>
        <section class="history">
            <h2>Signal History</h2>
            <ul id="signal-history">
                <!-- Signal history will be populated here -->
            </ul>
        </section>
        <section class="configuration">
            <h2>Configuration Inputs</h2>
            <label for="input-config">Input Configuration:</label>
            <input type="text" id="input-config" placeholder="Enter configuration">
            <button id="save-config">Save Configuration</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 C8 Elite Trading</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
